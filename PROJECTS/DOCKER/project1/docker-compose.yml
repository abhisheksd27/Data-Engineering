services:
  postgres:
    image: postgres:16
    container_name: dw_postgres
    environment:
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
      POSTGRES_DB: warehouse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

  etl:
    build: .
    container_name: sales_etl
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: warehouse
      DB_USER: etl_user
      DB_PASSWORD: etl_pass
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data

  adminer:
    image: adminer
    container_name: dw_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pg_data: